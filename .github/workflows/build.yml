name: Build and Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: nightly-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux
            os: ubuntu-22.04
            artifact_name: qurcuma-nightly-linux-x86_64.AppImage
          - name: windows
            os: windows-latest
            artifact_name: qurcuma-nightly-windows.zip
            cpack_generator: ZIP
          - name: macos
            os: macos-latest
            artifact_name: qurcuma-nightly-macos.zip
            cpack_generator: ZIP

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.6.3"
          modules: qtquick3d qtcharts qtshadertools
          cache: true

      # Claude Generated 2026 - main.cpp probes Vulkan via QVulkanInstance before
      # falling back to OpenGL. Without the system Vulkan headers, Qt's own
      # QVulkanInstance stays an incomplete type ("Could NOT find WrapVulkanHeaders"
      # at Configure) and `QVulkanInstance vk;` fails to compile.
      - name: Install Vulkan headers (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libvulkan-dev

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        # Claude Generated 2026 - explicit job count: unbounded --parallel on the
        # standard Linux runner OOM-kills cc1plus partway through (heavy Eigen/-O3
        # TUs in curcuma_core/curcuma_cap run multiple GCC instances out of RAM).
        run: cmake --build build --config Release --parallel 2

      # ---------- Linux: AppImage ----------
      - name: Install Linux deployment deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y fuse libfuse2 patchelf desktop-file-utils

      - name: Build AppImage (linuxdeploy + Qt plugin)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euxo pipefail

          mkdir -p tools AppDir/usr/bin AppDir/usr/share/applications AppDir/usr/share/icons/hicolor/256x256/apps

          # 1) Binary finden (ggf. Namen unten anpassen)
          APP_BIN="$(find build -type f -executable -name 'qurcuma*' | head -n1)"
          if [ -z "${APP_BIN}" ]; then
            echo "Kein ausführbares qurcuma-Binary in build/ gefunden."
            exit 1
          fi
          cp "${APP_BIN}" AppDir/usr/bin/qurcuma

          # 2) Desktop-Datei (ggf. Exec/Icon anpassen)
          cat > AppDir/usr/share/applications/qurcuma.desktop <<'EOF'
          [Desktop Entry]
          Type=Application
          Name=Qurcuma
          Exec=qurcuma
          Icon=qurcuma
          Categories=Education;Science;Chemistry;
          EOF

          # 3) Icon kopieren (Pfad ggf. anpassen)
          ICON_SRC="$(find . -type f \( -iname 'qurcuma.png' -o -iname '*icon*.png' \) | head -n1 || true)"
          if [ -n "${ICON_SRC}" ]; then
            cp "${ICON_SRC}" AppDir/usr/share/icons/hicolor/256x256/apps/qurcuma.png
          else
            # Fallback: leeres Placeholder-Icon vermeiden -> minimal
            convert -size 256x256 xc:transparent AppDir/usr/share/icons/hicolor/256x256/apps/qurcuma.png || true
          fi

          # 4) linuxdeploy + plugin holen
          curl -L -o tools/linuxdeploy https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          curl -L -o tools/linuxdeploy-plugin-qt https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          curl -L -o tools/appimagetool https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x tools/linuxdeploy tools/linuxdeploy-plugin-qt tools/appimagetool

          # AppImage entpackt ausführen (robuster in CI)
          export ARCH=x86_64
          export QML_SOURCES_PATHS="${GITHUB_WORKSPACE}"
          ./tools/linuxdeploy --appdir AppDir --desktop-file AppDir/usr/share/applications/qurcuma.desktop --icon-file AppDir/usr/share/icons/hicolor/256x256/apps/qurcuma.png --plugin qt --output appimage

          OUT="$(ls -1 ./*.AppImage | head -n1)"
          mv "${OUT}" "${{ matrix.artifact_name }}"

      # ---------- Windows/macOS: ZIP via CPack ----------
      - name: Package with CPack
        if: runner.os != 'Linux'
        run: |
          cpack --config build/CPackConfig.cmake -G ${{ matrix.cpack_generator }}

      - name: Prepare artifact (Windows/macOS)
        if: runner.os != 'Linux'
        shell: bash
        run: |
          pkg=$(ls -1 *.zip 2>/dev/null | head -n1)
          if [ -z "$pkg" ]; then
            echo "No .zip package produced by CPack"
            exit 1
          fi
          mv "$pkg" "${{ matrix.artifact_name }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.artifact_name }}
          if-no-files-found: error

  release:
    name: Publish nightly prerelease
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Ensure nightly tag exists
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch --tags
          if git rev-parse nightly >/dev/null 2>&1; then
            git tag -f nightly "${GITHUB_SHA}"
            git push origin refs/tags/nightly --force
          else
            git tag nightly "${GITHUB_SHA}"
            git push origin refs/tags/nightly
          fi

      - name: Publish to fixed prerelease
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: Nightly Build
          prerelease: true
          make_latest: false
          target_commitish: ${{ github.sha }}
          files: |
            dist/**/*.AppImage
            dist/**/*.zip
          body: |
            Automated nightly build.
            - Repository: ${{ github.repository }}
            - Commit: ${{ github.sha }}
            - Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          append_body: false
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
